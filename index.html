<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguaLift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="app">
    <header class="header">
      <button id="back-btn" class="back-btn" hidden aria-label="Go back">←</button>
      <div class="logo">
        <span class="logo-icon" aria-hidden="true">🌐</span>
        <div>
          <h1>LinguaLift</h1>
          <p id="header-sub" class="tagline">Learn languages through lessons & quizzes</p>
        </div>
      </div>
      <div id="header-xp" class="header-xp" hidden>
        <span class="xp-label">Fluency</span>
        <span id="header-xp-value" class="xp-value">0%</span>
      </div>
    </header>

    <!-- Home: pick language -->
    <section id="screen-home" class="screen active">
      <div class="section-intro">
        <h2 class="section-title">Choose a language</h2>
        <p class="section-desc">Complete lessons, pass quizzes, and build fluency step by step.</p>
      </div>
      <div id="language-grid" class="language-grid"></div>
    </section>

    <!-- Course: lesson list -->
    <section id="screen-course" class="screen">
      <div class="course-hero">
        <span id="course-flag" class="course-flag"></span>
        <div>
          <h2 id="course-title" class="section-title"></h2>
          <p id="course-level" class="course-level"></p>
        </div>
      </div>
      <div class="fluency-card">
        <div class="fluency-top">
          <span>Your fluency</span>
          <span id="fluency-percent">0%</span>
        </div>
        <div class="fluency-bar">
          <div id="fluency-fill" class="fluency-fill"></div>
        </div>
        <p id="fluency-detail" class="fluency-detail">0 of 0 lessons complete</p>
      </div>
      <h3 class="lessons-heading">Lessons</h3>
      <div id="lesson-list" class="lesson-list"></div>
    </section>

    <!-- Lesson (multi-step intro before quiz) -->
    <section id="screen-lesson" class="screen">
      <div class="lesson-step-nav">
        <span id="lesson-step-label" class="lesson-step-label">Step 1 of 5</span>
        <div id="lesson-step-dots" class="step-dots"></div>
      </div>
      <div class="lesson-badge" id="lesson-number"></div>
      <h2 id="lesson-title" class="section-title"></h2>
      <div id="lesson-step-content" class="lesson-step-content"></div>
      <div class="lesson-nav-buttons">
        <button id="lesson-prev" type="button" class="btn btn-secondary" hidden>Previous</button>
        <button id="lesson-next" type="button" class="btn btn-primary">Next</button>
      </div>
    </section>

    <!-- Quiz -->
    <section id="screen-quiz" class="screen">
      <div class="quiz-header-banner">
        <span class="quiz-banner-label">Quiz</span>
        <span id="quiz-lesson-name" class="quiz-banner-title"></span>
      </div>
      <div class="quiz-meta">
        <span id="quiz-progress">Question 1 of 8</span>
        <span id="quiz-score" class="quiz-score-live">0 correct</span>
      </div>
      <div class="progress-bar">
        <div id="quiz-progress-fill" class="progress-fill"></div>
      </div>
      <div class="question-card">
        <p class="question-label">Question</p>
        <p id="quiz-question" class="quiz-question"></p>
        <p id="quiz-hint" class="quiz-hint" hidden></p>
        <p id="quiz-prompt-type" class="quiz-prompt-type"></p>
        <div id="quiz-options" class="quiz-options"></div>
        <input id="quiz-input" class="quiz-input" type="text" hidden placeholder="Type your answer…" autocomplete="off" />
        <button id="quiz-submit" type="button" class="btn btn-secondary" hidden>Check answer</button>
      </div>
      <p id="quiz-feedback" class="quiz-feedback" hidden></p>
      <button id="quiz-next" type="button" class="btn btn-primary" hidden>Next question</button>
    </section>

    <!-- Results -->
    <section id="screen-results" class="screen">
      <div class="results-card">
        <p class="results-emoji" id="results-emoji">🎉</p>
        <h2 id="results-title" class="results-title">Lesson complete!</h2>
        <p id="results-score" class="results-score"></p>
        <p id="results-xp" class="results-xp"></p>
        <p id="results-fluency" class="results-fluency"></p>
      </div>
      <button id="results-continue" type="button" class="btn btn-primary">Back to lessons</button>
      <button id="results-retry" type="button" class="btn btn-secondary">Retry quiz</button>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
