<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynthWrite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 4h12v16H6z"/>
            <path d="M9 8h6M9 12h6M9 16h4"/>
          </svg>
        </span>
        <div>
          <h1>SynthWrite</h1>
          <p class="tagline">College-level essays with deep synthesis</p>
        </div>
      </div>
    </header>

    <section id="input-screen" class="screen active">
      <div class="panel">
        <div class="panel-head">
          <span class="panel-badge">Compose</span>
          <h2 class="panel-title">Your topic</h2>
          <p class="panel-desc">Enter a prompt, question, or thesis direction. The essay will argue, integrate sources of ideas, and synthesize—not merely summarize.</p>
        </div>

        <label for="prompt" class="label">Essay prompt</label>
        <textarea
          id="prompt"
          placeholder="e.g. Analyze how social media algorithms reshape democratic discourse, drawing on political theory and media studies…"
          rows="5"
        ></textarea>

        <div class="field-row">
          <div class="field">
            <label for="length" class="label">Essay length</label>
            <div class="select-wrap">
              <select id="length">
                <option value="brief">Brief — ~400 words</option>
                <option value="standard" selected>Standard — ~750 words</option>
                <option value="extended">Extended — ~1,200 words</option>
                <option value="comprehensive">Comprehensive — ~2,000 words</option>
              </select>
              <svg class="select-chevron" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
            </div>
          </div>
        </div>

        <p id="input-error" class="error" hidden></p>

        <button id="generate-btn" type="button" class="btn btn-primary">
          <span>Generate Essay</span>
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        </button>
      </div>
    </section>

    <section id="essay-screen" class="screen">
      <div class="essay-toolbar">
        <div class="essay-meta">
          <span id="essay-topic" class="essay-topic"></span>
          <span id="word-count" class="word-count"></span>
        </div>
        <div class="toolbar-actions">
          <button id="copy-btn" type="button" class="btn-icon" title="Copy essay">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 2a2 2 0 00-2 2v1H5a3 3 0 00-3 3v8a3 3 0 003 3h8a3 3 0 003-3v-1h1a2 2 0 002-2V5a2 2 0 00-2-2H8zm0 2h6v10H8V4zm-3 3a1 1 0 011-1h8a1 1 0 011 1v8a1 1 0 01-1 1H6a1 1 0 01-1-1V7z"/></svg>
          </button>
          <button id="new-essay-btn" type="button" class="btn btn-ghost">New prompt</button>
        </div>
      </div>

      <article id="essay-output" class="essay-output"></article>

      <div id="loading" class="loading" hidden>
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
        <p class="loading-text">Synthesizing argument and evidence…</p>
      </div>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
